<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano alimentare — Progetto Nutrizionista</title>
<style>
  :root {
    --verde: #2e7d4f;
    --verde-chiaro: #e8f5ee;
    --arancio: #e07b39;
    --rosso: #d9534f;
    --grigio: #6b7280;
    --bg: #f7f5f0;
    --card-bg: #ffffff;
    --testo: #2b2b2b;

  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--testo);
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, var(--verde) 0%, #1f5c38 100%);
    color: white;
    padding: 32px 24px 24px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 8px;
    font-size: 1.8rem;
  }
  header p {
    margin: 0;
    opacity: 0.9;
    font-size: 0.95rem;
  }
  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .controls-bar {
    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--ombra);
    padding: 18px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .control-group label {
    font-size: 0.8rem;
    color: var(--grigio);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  select {
    border: 1.5px solid #d8d4cb;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.95rem;
    background: white;
    color: var(--testo);
    min-width: 160px;
  }
  .view-tabs {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }
  .view-tab-btn {
    border: 1.5px solid #d8d4cb;
    background: white;
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--grigio);
    transition: all 0.15s ease;
  }
  .view-tab-btn.active {
    background: var(--verde);
    border-color: var(--verde);
    color: white;
  }
  .day-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .day-tab-btn {
    border: 1.5px solid #d8d4cb;
    background: white;
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--grigio);
    transition: all 0.15s ease;
  }
  .day-tab-btn:hover { border-color: var(--verde); }
  .day-tab-btn.active {
    background: var(--verde);
    border-color: var(--verde);
    color: white;
  }
  .day-summary {
    background: var(--verde-chiaro);
    border: 1px solid #d7ead9;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    align-items: flex-start;
    justify-content: space-between;
  }
  .day-summary-left {
    flex: 1 1 320px;
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: center;
  }
  .day-summary-left .titolo {
    font-weight: 700;
    color: var(--verde);
    font-size: 1.1rem;
    flex: 1 1 100%;
  }
  .stat {
    font-size: 0.9rem;
  }
  .stat b { display: block; font-size: 1.15rem; }
  .day-summary-right {
    flex: 1 1 240px;
    max-width: 340px;
  }
  .day-summary-right h3 {
    margin: 0 0 8px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--verde);
  }

    margin: 0;
    padding: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

    font-size: 0.85rem;
    color: var(--testo);
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }
  .day-summary-right li .qta {
    color: var(--grigio);
    white-space: nowrap;
    text-align: right;
  }

    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--ombra);
    margin-bottom: 18px;
    overflow: hidden;
  }

    padding: 14px 20px;

    border-bottom: 1px solid #d7ead9;
    display: flex;
    justify-content: space-between;

    font-size: 1.05rem;
    color: var(--verde);
  }

    padding: 4px 10px;
    border-radius: 999px;
  }
  .food-item {
    border-bottom: 1px solid #f0eee8;
  }
  .food-item:last-child {
    border-bottom: none;
  }
  .food-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    user-select: none;

    background: #fafaf8;
  }
  .food-item-name {
    font-weight: 500;
  }
  .food-item-right {

    align-items: center;
    gap: 8px;
    color: var(--grigio);
    font-size: 0.9rem;
    white-space: nowrap;

    display: inline-block;
    font-size: 0.75rem;
    transition: transform 0.15s ease;
    color: #b9b4a8;
  }
  .food-item.expanded .food-item-toggle-icon {
    transform: rotate(180deg);
  }
  .food-item-details {
    display: none;
    padding: 0 20px 12px 20px;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 0.82rem;
    color: var(--grigio);
  }
  .food-item.expanded .food-item-details {
    display: flex;
  }
  .food-item-details b {
    color: var(--testo);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  table th, table td {
    text-align: left;
    padding: 10px 20px;
    border-bottom: 1px solid #f0eee8;
  }
  table th {
    color: var(--grigio);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-weight: 600;
  }

  td.num, th.num { text-align: right; white-space: nowrap; }

    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--ombra);
    margin-bottom: 18px;
    overflow: hidden;

    padding: 14px 20px;

    color: var(--verde);

    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--ombra);
    margin-bottom: 18px;
    overflow: hidden;
  }
  .note-box {
    background: #fff8e6;
    border: 1px solid #f0dca0;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: #6b5a1d;
    margin-bottom: 20px;
  }
  .empty-state {
    text-align: center;
    color: var(--grigio);
    padding: 40px 20px;
  }
</style>
</head>

const ORDINE_GIORNI = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
const ORA_CAMBIO_GIORNO = 21; // dopo le 21:00 si passa già al piano del giorno dopo

function calcolaGiornoCorrente() {
  const ora = new Date();
  let giornoSettimana = ora.getDay(); // 0 = domenica, 1 = lunedì, ... 6 = sabato
  if (ora.getHours() >= ORA_CAMBIO_GIORNO) {
    giornoSettimana = (giornoSettimana + 1) % 7;
  }
  const indice = (giornoSettimana + 6) % 7; // 0 = lunedì ... 6 = domenica, come in ORDINE_GIORNI
  return ORDINE_GIORNI[indice];
}

let utenteCorrente = Object.keys(datiUtenti)[0];
let giornoCorrente = calcolaGiornoCorrente();
let vistaCorrente = "giorno";

function fmt(n) {
  return (Math.round(n * 10) / 10).toString().replace(".", ",");
}

function popolaSelectUtenti() {
  const select = document.getElementById("selectUtente");
  select.innerHTML = "";
  Object.keys(datiUtenti).forEach(key => {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = datiUtenti[key].nomeVisualizzato;
    select.appendChild(opt);
  });
  select.value = utenteCorrente;
}

function renderDayTabs() {
  const wrap = document.getElementById("dayTabs");
  wrap.innerHTML = "";
  ORDINE_GIORNI.forEach(giorno => {
    const btn = document.createElement("button");
    btn.className = "day-tab-btn" + (giorno === giornoCorrente ? " active" : "");
    btn.textContent = giorno;
    btn.addEventListener("click", () => {
      giornoCorrente = giorno;
      renderDayTabs();
      renderGiorno();
    });
    wrap.appendChild(btn);
  });
}

function renderGiorno() {
  const utente = datiUtenti[utenteCorrente];
  const cont = document.getElementById("contenutoGiorno");
  cont.innerHTML = "";

  const giorno = utente.giorni[giornoCorrente];
  if (!giorno) {
    cont.innerHTML = `<div class="empty-state">Nessun piano disponibile per questo giorno.</div>`;
    return;
  }

  const elencoGiorno = new Map();
  giorno.pasti.forEach(pasto => {
    pasto.alimenti.forEach(a => {
      if (elencoGiorno.has(a.alimento)) {
        elencoGiorno.get(a.alimento).push(a.quantita);
      } else {
        elencoGiorno.set(a.alimento, [a.quantita]);
      }
    });
  });

  const summary = document.createElement("div");
  summary.className = "day-summary";
  summary.innerHTML = `
    <div class="day-summary-left">
      <div class="titolo">${giornoCorrente} — Totale giornata</div>
      <div class="stat">kcal<b>${fmt(giorno.totale.kcal)}</b></div>
      <div class="stat">Proteine<b>${fmt(giorno.totale.proteine)} g</b></div>
      <div class="stat">Grassi<b>${fmt(giorno.totale.grassi)} g</b></div>
      <div class="stat">Carboidrati<b>${fmt(giorno.totale.carboidrati)} g</b></div>
    </div>
    <div class="day-summary-right">
      <h3>Alimenti della giornata</h3>
      <ul>
        ${Array.from(elencoGiorno.entries()).map(([alimento, quantita]) => `
          <li><span>${alimento}</span><span class="qta">${quantita.join(" + ")}</span></li>
        `).join("")}
      </ul>
    </div>
  `;
  cont.appendChild(summary);

  giorno.pasti.forEach(pasto => {
    const card = document.createElement("div");
    card.className = "meal-card";

    const header = document.createElement("div");
    header.className = "meal-header";
    header.innerHTML = `<h2>${pasto.nome}</h2><span class="meal-kcal">${fmt(pasto.totale.kcal)} kcal · P ${fmt(pasto.totale.proteine)} g · G ${fmt(pasto.totale.grassi)} g · C ${fmt(pasto.totale.carboidrati)} g</span>`;
    card.appendChild(header);

    const list = document.createElement("div");
    list.className = "food-list";

    pasto.alimenti.forEach(a => {
      const item = document.createElement("div");
      item.className = "food-item";
      item.innerHTML = `
        <div class="food-item-row">
          <span class="food-item-name">${a.alimento}</span>
          <span class="food-item-right">${a.quantita}<span class="food-item-toggle-icon">▾</span></span>
        </div>
        <div class="food-item-details">
          <span>kcal <b>${fmt(a.kcal)}</b></span>
          <span>Proteine <b>${fmt(a.proteine)} g</b></span>
          <span>Grassi <b>${fmt(a.grassi)} g</b></span>
          <span>Carboidrati <b>${fmt(a.carboidrati)} g</b></span>
        </div>
      `;
      item.querySelector(".food-item-row").addEventListener("click", () => {
        item.classList.toggle("expanded");
      });
      list.appendChild(item);
    });

    card.appendChild(list);
    cont.appendChild(card);
  });
}

function renderSpesa() {
  const utente = datiUtenti[utenteCorrente];
  const cont = document.getElementById("contenutoSpesa");
  cont.innerHTML = "";

  const summaryTable = document.createElement("div");
  summaryTable.className = "week-summary-table";
  summaryTable.innerHTML = `
    <h2 style="margin:0;padding:14px 20px;background:var(--verde-chiaro);border-bottom:1px solid #d7ead9;font-size:1.05rem;color:var(--verde);">Media settimanale vs target</h2>
    <table>
      <thead><tr><th></th><th class="num">kcal</th><th class="num">Proteine</th><th class="num">Grassi</th><th class="num">Carboidrati</th></tr></thead>
      <tbody>
        <tr><td>Media piano</td><td class="num">${fmt(utente.mediaSettimanale.kcal)}</td><td class="num">${fmt(utente.mediaSettimanale.proteine)} g</td><td class="num">${fmt(utente.mediaSettimanale.grassi)} g</td><td class="num">${fmt(utente.mediaSettimanale.carboidrati)} g</td></tr>
        <tr><td>Target</td><td class="num">${fmt(utente.target.kcal)}</td><td class="num">${fmt(utente.target.proteine)} g</td><td class="num">${fmt(utente.target.grassi)} g</td><td class="num">${fmt(utente.target.carboidrati)} g</td></tr>
      </tbody>
    </table>
  `;
  cont.appendChild(summaryTable);

  Object.keys(utente.spesa).forEach(categoria => {
    const div = document.createElement("div");
    div.className = "spesa-category";
    div.innerHTML = `
      <h2>${categoria}</h2>
      <table>
        <tbody>
          ${utente.spesa[categoria].map(item => `
            <tr><td>${item.alimento}</td><td class="num">${item.quantita}</td></tr>
          `).join("")}
        </tbody>
      </table>
    `;
    cont.appendChild(div);
  });
}

function mostraVista(vista) {
  vistaCorrente = vista;
  document.getElementById("vistaGiorno").style.display = vista === "giorno" ? "block" : "none";
  document.getElementById("vistaSpesa").style.display = vista === "spesa" ? "block" : "none";
  document.getElementById("tabGiorno").classList.toggle("active", vista === "giorno");
  document.getElementById("tabSpesa").classList.toggle("active", vista === "spesa");
}

document.getElementById("selectUtente").addEventListener("change", (e) => {
  utenteCorrente = e.target.value;
  giornoCorrente = calcolaGiornoCorrente();
  renderDayTabs();
  renderGiorno();
  renderSpesa();
});

document.getElementById("tabGiorno").addEventListener("click", () => mostraVista("giorno"));
document.getElementById("tabSpesa").addEventListener("click", () => mostraVista("spesa"));

popolaSelectUtenti();
renderDayTabs();
renderGiorno();
renderSpesa();
</script>
